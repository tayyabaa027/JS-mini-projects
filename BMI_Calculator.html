<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BMI Calculator</title>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                background: #1e293b;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .container {
                width: 400px;
                background: #fff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(148, 144, 144, 0.3);
            }

            h1 {
                text-align: center;
                margin-bottom: 25px;
                color: #1e293b;
            }

            p {
                margin: 15px 0;
            }

            label {
                display: inline-block;
                width: 120px;
                font-weight: bold;
                color: #333;
            }

            input {
                width: 180px;
                padding: 8px 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                outline: none;
            }

            input:focus {
                border-color: #2563eb;
            }

            button {
                width: 100%;
                padding: 10px;
                margin-top: 20px;
                background: #2563eb;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                cursor: pointer;
            }

            button:hover {
                background: #1d4ed8;
            }

            #results {
                margin-top: 20px;
                font-size: 22px;
                font-weight: bold;
                text-align: center;
                color: #16a34a;
            }

            #weight-guide {
                margin-top: 25px;
                padding-top: 15px;
                border-top: 1px solid #ddd;
            }

            #weight-guide h3 {
                margin-bottom: 10px;
                color: #1e293b;
            }

            #weight-guide p {
                margin: 8px 0;
                color: #555;
            }
        </style>
    </head>
</head>

<body>

    <nav>
    </nav>

    <div class="container">
        <h1>BMI Calculator</h1>

        <form>
            <p>
                <label>Height in CM: </label>
                <input type="text" id="height">
            </p>

            <p>
                <label>Weight in KG: </label>
                <input type="text" id="weight">
            </p>

            <button>Calculate</button>

            <div id="results"></div>

            <div id="weight-guide">
                <h3>BMI Weight Guide</h3>

                <p>Under Weight = Less than 18.6</p>
                <p>Normal Range = 18.6 and 24.9</p>
                <p>Overweight = Greater than 24.9</p>
            </div>
        </form>
    </div>
    <script>
        const btn = document.querySelector("button");
        const height = document.querySelector("#height");
        const weight = document.querySelector("#weight");
        const div = document.querySelector("#results");

        btn.addEventListener("click", (event) => {

            event.preventDefault();

            let h = Number(height.value) / 100;
            let w = Number(weight.value);
            if (h <= 0 && w <= 0) {
                div.innerHTML = "Please enter valid height and weight.";
                return;
            }
            if (h <= 0) {
                div.innerHTML = "Please enter a valid height";
                return;
            }
            if (w <= 0) {
                div.innerHTML = "Please enter a valid weight";
                return;
            }
            let result = w / (h * h);

            div.innerHTML = result.toFixed(2);

            height.value = "";
            weight.value = "";
        });
    </script>
</body>

</html>
