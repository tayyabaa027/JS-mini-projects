<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #board {
      width: 400px;
      height: 400px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px);
      background: #222;
      border: 3px solid white;
    }

    .cell {
      width: 20px;
      height: 20px;
      border: 1px solid #333;
      box-sizing: border-box;
    }

    .snake {
      background: limegreen;
    }

    .food {
      background: red;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 5px;
      cursor: pointer;
      border: 3px solid whitesmoke;
      border-radius: 5px;
      background: black;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>🐍 Snake Game</h1>
<h2>Score: <span id="score">0</span></h2>
<button id="startBtn">Start Game</button>
<div id="board"></div>

<script>
const board = document.getElementById("board");
const scoreText = document.getElementById("score");
const startBtn = document.getElementById("startBtn");

const size = 20;
let snake = [];
let direction = {x:0, y:0};
let food = {};
let score = 0;
let interval;
let cells = [];

// Create grid cells
for(let y=0; y<size; y++){
  for(let x=0; x<size; x++){
    const cell = document.createElement("div");
    cell.classList.add("cell");
    board.appendChild(cell);
    cells.push(cell);
  }
}

// Draw snake and food
function draw(){
  cells.forEach(cell => cell.classList.remove("snake","food"));
  snake.forEach(seg => {
    const index = seg.y*size + seg.x;
    cells[index].classList.add("snake");
  });
  const foodIndex = food.y*size + food.x;
  cells[foodIndex].classList.add("food");
}

// Move snake
function move(){
  const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

  // Wall or self collision
  if(head.x<0 || head.x>=size || head.y<0 || head.y>=size || 
     snake.some(seg => seg.x===head.x && seg.y===head.y)){
    clearInterval(interval);
    alert("Game Over! Score: "+score);
    startBtn.disabled = false; // allow restart
    return;
  }

  snake.unshift(head);

  // Eat food
  if(head.x===food.x && head.y===food.y){
    score++;
    scoreText.innerText = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

// Place food
function placeFood(){
  let valid = false;
  while(!valid){
    food = {x: Math.floor(Math.random()*size), y: Math.floor(Math.random()*size)};
    valid = !snake.some(seg => seg.x===food.x && seg.y===food.y);
  }
}

// Keyboard controls
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp" && direction.y!==1) direction={x:0, y:-1};
  if(e.key==="ArrowDown" && direction.y!==-1) direction={x:0, y:1};
  if(e.key==="ArrowLeft" && direction.x!==1) direction={x:-1, y:0};
  if(e.key==="ArrowRight" && direction.x!==-1) direction={x:1, y:0};
});

// Start game
function startGame(){
  clearInterval(interval); // clear previous interval if any
  snake = [{x:10, y:10}];
  direction = {x:1, y:0};
  score = 0;
  scoreText.innerText = score;
  startBtn.disabled = true; // disable during game
  placeFood();
  draw();
  interval = setInterval(move, 200);
}

// Start button listener
startBtn.addEventListener("click", startGame);

</script>

</body>
</html>
